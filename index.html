<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZAID MEHMOOD // DIGITAL ARCHITECT</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css">
    
    <style>
        /* --- ARCHITECTURAL CSS ENGINE --- */
        :root {
            --y: #FFD200; --o: #FF5A35; --b: #000; --w: #fff;
            --e: cubic-bezier(0.8, 0, 0.2, 1);
            --e-out: cubic-bezier(0.22, 1, 0.36, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; outline: none; }
        body { 
            background: var(--b); color: var(--w); 
            font-family: 'Inter', sans-serif; 
            overflow: hidden; /* We'll use JS for Smooth Scroll */
            height: 100vh;
        }

        /* --- SMOOTH SCROLL CONTAINER --- */
        #scroll-container {
            position: fixed; top: 0; left: 0; width: 100%;
            will-change: transform;
        }

        /* --- ADVANCED KINETIC CURSOR --- */
        #cursor-main {
            position: fixed; width: 8px; height: 8px; background: #fff;
            border-radius: 50%; pointer-events: none; z-index: 10000;
            mix-blend-mode: difference;
        }
        #cursor-aura {
            position: fixed; width: 40px; height: 40px; border: 1px solid rgba(255,255,255,0.3);
            border-radius: 50%; pointer-events: none; z-index: 9999;
            transition: width 0.3s, height 0.3s, background 0.3s;
        }

        /* --- THE ULTIMATE SPLIT HERO --- */
        .hero { display: flex; height: 100vh; width: 100vw; position: relative; }
        .side {
            flex: 1; display: flex; flex-direction: column; justify-content: center;
            align-items: center; transition: flex 1s var(--e);
            position: relative; overflow: hidden;
        }
        .hero:has(.design:hover) .design { flex: 4; }
        .hero:has(.develop:hover) .develop { flex: 4; }

        .design { background: var(--y); color: #000; }
        .develop { background: var(--o); color: #000; }

        .side h1 {
            font-size: clamp(5rem, 18vw, 15rem); font-weight: 900;
            text-transform: uppercase; letter-spacing: -12px; line-height: 0.7;
            will-change: transform;
        }
        .side p {
            position: absolute; bottom: 50px; font-weight: 900;
            text-transform: uppercase; letter-spacing: 5px; font-size: 0.7rem;
            opacity: 0.4;
        }

        /* --- BRUTAL GRID --- */
        .grid-section { padding: 150px 5%; background: #000; }
        .grid-parent {
            display: grid; grid-template-columns: repeat(4, 1fr);
            border-top: 1px solid #222; border-left: 1px solid #222;
        }
        .grid-item {
            border-right: 1px solid #222; border-bottom: 1px solid #222;
            padding: 100px 20px; display: flex; flex-direction: column;
            align-items: center; transition: 0.4s var(--e-out);
        }
        .grid-item:hover { background: #fff; color: #000; }
        .grid-item i { font-size: 4rem; margin-bottom: 20px; }
        .grid-item span { font-weight: 900; text-transform: uppercase; font-size: 0.8rem; }

        /* --- WORK SECTION --- */
        .work-section { padding: 100px 5%; }
        .work-row {
            display: flex; justify-content: space-between; align-items: flex-end;
            padding: 100px 0; border-bottom: 1px solid #222;
            transition: 0.5s var(--e-out);
        }
        .work-row:hover { padding-left: 50px; border-bottom-color: var(--y); }
        .work-row h2 { font-size: 8vw; font-weight: 900; text-transform: uppercase; letter-spacing: -6px; }

        /* --- FOOTER --- */
        footer { padding: 200px 5% 50px; background: #000; }
        .footer-big { font-size: 15vw; font-weight: 900; letter-spacing: -12px; line-height: 0.7; margin-bottom: 100px; }
        .footer-meta { display: flex; justify-content: space-between; font-weight: 900; opacity: 0.3; font-size: 0.8rem; }

    </style>
</head>
<body>

    <div id="cursor-main"></div>
    <div id="cursor-aura"></div>

    <div id="scroll-container">
        <section class="hero">
            <div class="side design">
                <h1 class="parallax" data-speed="0.1">Design</h1>
                <p>Architecture of Vision</p>
            </div>
            <div class="side develop">
                <h1 class="parallax" data-speed="-0.1">Develop</h1>
                <p>Architecture of Logic</p>
            </div>
        </section>

        <section class="grid-section">
            <div class="grid-parent">
                <div class="grid-item"><i class="devicon-python-plain"></i><span>Python</span></div>
                <div class="grid-item"><i class="devicon-javascript-plain"></i><span>JavaScript</span></div>
                <div class="grid-item"><i class="devicon-react-original"></i><span>React_JS</span></div>
                <div class="grid-item"><i class="devicon-mongodb-plain"></i><span>Mongo_DB</span></div>
                <div class="grid-item"><i class="devicon-nodejs-plain"></i><span>Node_JS</span></div>
                <div class="grid-item"><i class="devicon-tailwindcss-original"></i><span>Tailwind</span></div>
                <div class="grid-item"><i class="devicon-figma-plain"></i><span>Figma</span></div>
                <div class="grid-item"><i class="devicon-git-plain"></i><span>Git_Flow</span></div>
            </div>
        </section>

        <section class="work-section">
            <div class="work-row"><h2>Huarache</h2><span>/ 01</span></div>
            <div class="work-row"><h2>Identity</h2><span>/ 02</span></div>
            <div class="work-row"><h2>Systems</h2><span>/ 03</span></div>
        </section>

        <footer>
            <div class="footer-big">LET'S<br>BUILD.</div>
            <div class="footer-meta">
                <div>ZAID MEHMOOD © 2026</div>
                <div>KARACHI, PK (24° 51')</div>
            </div>
        </footer>
    </div>

    <script>
        /* --- THE LOGIC ENGINE --- */

        // 1. KINETIC CURSOR (Lerp Physics)
        const cMain = document.getElementById('cursor-main');
        const cAura = document.getElementById('cursor-aura');
        let mX = 0, mY = 0, aX = 0, aY = 0;

        document.addEventListener('mousemove', e => {
            mX = e.clientX; mY = e.clientY;
            cMain.style.transform = `translate3d(${mX}px, ${mY}px, 0)`;
        });

        function updateCursor() {
            aX += (mX - aX - 20) * 0.15;
            aY += (mY - aY - 20) * 0.15;
            cAura.style.transform = `translate3d(${aX}px, ${aY}px, 0)`;
            requestAnimationFrame(updateCursor);
        }
        updateCursor();

        // 2. SMOOTH MOMENTUM SCROLLING
        let current = 0;
        let target = 0;
        let ease = 0.075;
        const container = document.getElementById('scroll-container');

        function smoothScroll() {
            target = window.scrollY;
            current += (target - current) * ease;
            container.style.transform = `translate3d(0, ${-current}px, 0)`;
            
            // Adjust body height to match container
            document.body.style.height = `${container.getBoundingClientRect().height}px`;
            requestAnimationFrame(smoothScroll);
        }
        smoothScroll();

        // 3. PARALLAX ELEMENTS
        window.addEventListener('scroll', () => {
            const items = document.querySelectorAll('.parallax');
            items.forEach(el => {
                const speed = el.getAttribute('data-speed');
                el.style.transform = `translateY(${window.scrollY * speed}px)`;
            });
        });

        // 4. INTERACTIVE HOVERS
        const interactables = document.querySelectorAll('.grid-item, .work-row, .side');
        interactables.forEach(el => {
            el.addEventListener('mouseenter', () => {
                cAura.style.width = '80px';
                cAura.style.height = '80px';
                cAura.style.background = 'rgba(255,255,255,0.1)';
            });
            el.addEventListener('mouseleave', () => {
                cAura.style.width = '40px';
                cAura.style.height = '40px';
                cAura.style.background = 'transparent';
            });
        });

    </script>
</body>
</html>
